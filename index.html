<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e0c0a">
<title>Manna · Crumb Stock Flow</title>
<style>
  :root{
    --bg:#0e0c0a; --panel:#151210; --panel2:#1b1713; --raise:#221c16;
    --ink:#ece6da; --dim:#b0a692; --faint:#6f665a;
    --amber:#e8a13a; --amber-dim:#a9772a; --amber-soft:rgba(232,161,58,.13);
    --steel:#7fa8c9; --steel-soft:rgba(127,168,201,.13);
    --in:#6cb83f; --in-soft:rgba(108,184,63,.12);
    --out:#d98a3d; --out-soft:rgba(217,138,61,.13);
    --elec:#46c2d6; --err:#d8453c;
    --line:#2a2520; --line2:#39322a;
    --r:14px; --r-sm:10px;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,system-ui,sans-serif;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans); font-size:15px; line-height:1.45; -webkit-font-smoothing:antialiased; }
  body{ padding-bottom:48px; }
  .tnum{ font-family:var(--mono); font-variant-numeric:tabular-nums; }
  button{ font-family:inherit; cursor:pointer; }

  header{ position:sticky; top:0; z-index:30; background:linear-gradient(180deg,#0e0c0a,rgba(14,12,10,.92)); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); }
  .bar{ max-width:1080px; margin:0 auto; padding:13px 18px 14px; }
  .eyebrow{ font-size:10.5px; letter-spacing:.32em; text-transform:uppercase; color:var(--amber-dim); font-weight:700; }
  .brand h1{ margin:3px 0 0; font-size:20px; font-weight:800; letter-spacing:-.01em; }
  .brand h1 b{ color:var(--amber); }
  .conn{ display:inline-flex; align-items:center; gap:7px; font-size:11.5px; color:var(--faint); margin-top:5px; font-family:var(--mono); }
  .dot{ width:8px; height:8px; border-radius:50%; background:var(--faint); }
  .dot.live{ background:var(--in); box-shadow:0 0 8px 1px rgba(108,184,63,.6); }
  .dot.load{ background:var(--amber); animation:pulse 1s infinite; }
  .dot.err{ background:var(--err); box-shadow:0 0 8px 1px rgba(216,69,60,.5); }
  @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.35} }

  .controls{ display:flex; align-items:flex-end; gap:10px; flex-wrap:wrap; margin-top:13px; }
  .ctl{ display:flex; flex-direction:column; gap:5px; }
  .ctl label{ font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint); font-weight:700; padding-left:1px; }
  input[type=date]{ background:var(--panel2); border:1px solid var(--line2); color:var(--ink); border-radius:var(--r-sm); padding:9px 11px; font-family:var(--mono); font-size:14px; color-scheme:dark; }
  .quick{ display:inline-flex; gap:6px; }
  .quick button{ background:var(--raise); border:1px solid var(--line2); color:var(--dim); border-radius:8px; padding:8px 11px; font-size:12.5px; font-weight:650; }
  .quick button.on{ background:var(--amber); color:#1c1306; border-color:transparent; }
  .reload{ margin-left:auto; display:inline-flex; align-items:center; gap:7px; background:var(--raise); border:1px solid var(--line2); color:var(--ink); border-radius:var(--r-sm); padding:9px 14px; font-weight:650; font-size:13.5px; }
  .reload svg{ width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:2; }
  .reload:active{ transform:translateY(1px); }

  main{ max-width:1080px; margin:0 auto; padding:18px; }

  /* store balance cards */
  .stores{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:8px; }
  .store{ background:linear-gradient(180deg,var(--panel2),var(--panel)); border:1px solid var(--line); border-radius:var(--r); padding:15px 16px; position:relative; overflow:hidden; }
  .store::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--steel); }
  .store.bike::before{ background:var(--out); }
  .store .nm{ font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); font-weight:750; }
  .store .net{ font-family:var(--mono); font-size:30px; font-weight:600; margin-top:8px; line-height:1; }
  .store .net small{ font-size:14px; color:var(--faint); }
  .store .io{ display:flex; gap:16px; margin-top:11px; }
  .store .io div{ font-size:12px; color:var(--faint); }
  .store .io b{ font-family:var(--mono); font-weight:600; }
  .store .io .pin{ color:var(--in); } .store .io .pout{ color:var(--out); }

  .note{ font-size:12px; color:var(--faint); margin:4px 2px 16px; line-height:1.5; }

  .filters{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
  .seg{ display:inline-flex; background:var(--panel2); border:1px solid var(--line2); border-radius:9px; padding:3px; gap:3px; }
  .seg button{ border:none; background:none; color:var(--dim); font-weight:650; font-size:13px; padding:6px 13px; border-radius:6px; }
  .seg button.on{ background:var(--amber); color:#1c1306; }
  .count{ margin-left:auto; font-size:12.5px; color:var(--faint); font-family:var(--mono); }

  /* ledger */
  .ledger{ display:flex; flex-direction:column; gap:0; border:1px solid var(--line); border-radius:var(--r); overflow:hidden; }
  .ev{ display:grid; grid-template-columns:64px 1fr auto; gap:12px; align-items:center; padding:13px 15px; border-top:1px solid var(--line); background:var(--panel); }
  .ev:first-child{ border-top:none; }
  .ev .dir{ display:flex; flex-direction:column; align-items:flex-start; gap:3px; }
  .badge{ font-size:10.5px; font-weight:800; letter-spacing:.08em; padding:3px 8px; border-radius:6px; text-transform:uppercase; }
  .badge.in{ background:var(--in-soft); color:var(--in); border:1px solid #2f5320; }
  .badge.out{ background:var(--out-soft); color:var(--out); border:1px solid #5a3f1c; }
  .ev .body .where{ font-weight:700; font-size:15px; }
  .ev .body .arrow{ color:var(--faint); font-weight:400; }
  .ev .body .meta{ font-size:12px; color:var(--faint); margin-top:3px; }
  .ev .body .meta .gchip{ display:inline-block; font-family:var(--mono); font-size:10.5px; font-weight:700; color:var(--steel); background:var(--steel-soft); border:1px solid #2f4658; border-radius:5px; padding:1px 6px; margin-right:7px; }
  .ev .body .meta .gchip.b{ color:var(--out); background:var(--out-soft); border-color:#5a3f1c; }
  .ev .amt{ text-align:right; white-space:nowrap; }
  .ev .amt .kg{ font-family:var(--mono); font-size:17px; font-weight:600; }
  .ev .amt .kg.in{ color:var(--in); } .ev .amt .kg.out{ color:var(--out); }
  .ev .amt .bal{ font-size:11px; color:var(--faint); margin-top:3px; font-family:var(--mono); }
  .ev .amt .when{ font-size:11px; color:var(--faint); margin-top:2px; font-family:var(--mono); }

  .empty{ text-align:center; padding:60px 20px; color:var(--faint); }
  .empty svg{ width:40px; height:40px; stroke:var(--line2); fill:none; stroke-width:1.5; margin-bottom:14px; }
  .empty b{ display:block; color:var(--dim); font-size:16px; font-weight:700; margin-bottom:5px; }
  .empty p{ margin:0 auto; max-width:340px; font-size:13.5px; line-height:1.5; }

  @media (max-width:560px){ .bar{padding:12px 14px} main{padding:14px} .reload{margin-left:0} .ev{grid-template-columns:58px 1fr auto; gap:9px; padding:12px} }
  @media (prefers-reduced-motion:reduce){ *{animation:none!important;transition:none!important} }
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="brand">
      <div class="eyebrow">Stock Movement</div>
      <h1>Crumb <b>Stock Flow</b></h1>
      <div class="conn"><span class="dot" id="dot"></span><span id="connTxt">connecting…</span></div>
    </div>
    <div class="controls">
      <div class="ctl"><label for="fromIn">From</label><input type="date" id="fromIn"></div>
      <div class="ctl"><label for="toIn">To</label><input type="date" id="toIn"></div>
      <div class="ctl"><label>Quick range</label>
        <div class="quick" id="quick">
          <button data-q="7">7d</button><button data-q="30">30d</button><button data-q="all">All</button>
        </div>
      </div>
      <button class="reload" id="reloadBtn"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 4v4h4"/></svg>Reload</button>
    </div>
  </div>
</header>

<main id="view"></main>

<script>
(function(){
  "use strict";

  /* ===== Supabase (same project the shopfloor app writes to) ===== */
  var SUPABASE_URL  = "https://xqdmxfjmmazfpmsvbnjx.supabase.co";
  var SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhxZG14ZmptbWF6ZnBtc3Zibmp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzE2MDcsImV4cCI6MjA5NzIwNzYwN30.tjR30i3Cdaz-6S2tr-7s5gvvOz24rTK0KyxW47itC6s";
  function headers(){ return { "apikey":SUPABASE_ANON, "Authorization":"Bearer "+SUPABASE_ANON }; }

  /* ===== domain ===== */
  // grinders that feed crumb into stock (Cracker does tyre prep only, no stock)
  var CRUMB_GRINDERS={ "GRD_K":"Grinder 1", "GRD_S":"Grinder 2", "GRD_O":"Soorya Grinder" };
  var MNAME={ "GRD_K":"Grinder 1","GRD_S":"Grinder 2","GRD_O":"Soorya Grinder","CRK":"Cracker",
    "AC_A":"Autoclave A","AC_M":"Autoclave M","AC_N":"Autoclave N","AC_O":"Autoclave O",
    "R1":"Refiner 1","R2":"Refiner 2","R3":"Refiner 3","R4":"Refiner 4","PR1":"Pre-Refiner 1","PR2":"Pre-Refiner 2" };
  function mname(id){ return MNAME[id]||id||"Unknown"; }
  // store keys: truck = Truck 30# (special line), bike = Bike 20# (coarse line)
  var STORE={ truck:{label:"Truck crumb", grade:"30#", line:"special"}, bike:{label:"Bike crumb", grade:"20#", line:"coarse"} };

  /* ===== helpers ===== */
  function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }
  function populated(v){ return v!==null && v!==undefined && v!==""; }
  function num(v){ var n=Number(v); return isNaN(n)?0:n; }
  function pad(n){ return (n<10?"0":"")+n; }
  function todayISO(){ var d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
  function shiftDate(daysAgo){ var d=new Date(Date.now()-daysAgo*86400000); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
  function fmtWhen(iso){ if(!iso) return "—"; var d=new Date(iso); if(isNaN(d)) return String(iso); return pad(d.getDate())+"/"+pad(d.getMonth()+1)+" "+pad(d.getHours())+":"+pad(d.getMinutes()); }
  function kg(n){ return (Math.round(n*10)/10).toLocaleString(); }

  /* ===== state ===== */
  var ST={ from:"", to:"", runs:null, loading:false, error:"", filter:"all", quick:"7" };

  /* derive crumb store of an OUT (autoclave load) row: coarse line -> bike(20#), else truck(30#) */
  function outStore(r){ return (String(r.line||"").toLowerCase()==="coarse") ? "bike" : "truck"; }
  /* derive store of an IN (grinder) row from tyre type / mesh */
  function inStore(r){
    var t=String(r.tyre_type||"").toLowerCase();
    if(t==="truck") return "truck"; if(t==="bike") return "bike";
    var m=String(r.mesh||""); if(m.indexOf("30")>=0) return "truck"; if(m.indexOf("20")>=0) return "bike";
    return "truck"; // grinder default
  }

  // Build chronological IN/OUT events from raw run rows
  function buildEvents(runs){
    var ev=[];
    (runs||[]).forEach(function(r){
      var mid=r.machine_id||"";
      // OUT: an autoclave load consumes stock — signalled by a loaded_at timestamp + capacity
      if(populated(r.loaded_at)){
        var os=outStore(r);
        ev.push({ type:"out", store:os, kg:num(r.capacity), ts:r.loaded_at||r.started_at||r.shift_date,
          machineId:mid, machine:mname(mid), batch:r.batch_no||"", formulation:r.formulation||"",
          shift:r.shift||"", shiftDate:r.shift_date||"", supervisor:r.supervisor||"" });
      }
      // IN: a crumb grinder run adds its shift weight into stock
      if(CRUMB_GRINDERS[mid] && num(r.weight_kg)>0){
        var is=inStore(r);
        ev.push({ type:"in", store:is, kg:num(r.weight_kg), ts:r.ended_at||r.started_at||r.shift_date,
          machineId:mid, machine:mname(mid), batch:"", formulation:"",
          shift:r.shift||"", shiftDate:r.shift_date||"", supervisor:r.supervisor||"" });
      }
    });
    // chronological ascending for running balance
    ev.sort(function(a,b){ return tms(a.ts)-tms(b.ts); });
    var bal={truck:0,bike:0};
    ev.forEach(function(e){ bal[e.store]+=(e.type==="in"?e.kg:-e.kg); e.balAfter=Math.round(bal[e.store]*10)/10; });
    return ev;
  }
  function tms(t){ if(!t) return 0; var d=new Date(t); var n=+d; if(!isNaN(n)) return n; return 0; }

  function totals(ev){
    var t={ truck:{in:0,out:0}, bike:{in:0,out:0} };
    ev.forEach(function(e){ t[e.store][e.type]+=e.kg; });
    return t;
  }

  /* ===== data ===== */
  function load(){
    ST.loading=true; ST.error=""; setConn("load","loading "+ST.from+" → "+ST.to+"…"); render();
    var url=SUPABASE_URL+"/rest/v1/runs?select=machine_id,line,kind,batch_no,formulation,capacity,tyre_type,mesh,weight_kg,started_at,ended_at,loaded_at,shift,shift_date,supervisor"
      +"&shift_date=gte."+encodeURIComponent(ST.from)
      +"&shift_date=lte."+encodeURIComponent(ST.to)
      +"&order=shift_date.asc";
    fetch(url,{ headers:headers() })
      .then(function(r){ if(!r.ok) return r.text().then(function(t){ throw new Error("HTTP "+r.status+" "+(t||"").slice(0,140)); }); return r.json(); })
      .then(function(rows){ ST.runs=rows||[]; ST.loading=false; setConn("live", ST.runs.length+" runs scanned"); render(); })
      .catch(function(e){ ST.loading=false; ST.runs=[]; ST.error=String(e.message||e); setConn("err","couldn't load — "+ST.error); render(); });
  }

  function setConn(cls,txt){ var d=document.getElementById("dot"), t=document.getElementById("connTxt");
    d.className="dot "+(cls==="live"?"live":cls==="err"?"err":cls==="load"?"load":""); t.textContent=txt; }

  /* ===== render ===== */
  function render(){
    var v=document.getElementById("view");
    if(ST.loading){ v.innerHTML=block("M3 12a9 9 0 1 0 3-6.7L3 8","Loading…","Scanning runs from "+esc(ST.from)+" to "+esc(ST.to)+"."); return; }
    if(ST.error){ v.innerHTML=block("M12 9v4M12 17h.01M10.3 4 2.6 18a1.5 1.5 0 0 0 1.3 2.2h16.2A1.5 1.5 0 0 0 21.4 18L13.7 4Z","Couldn\u2019t reach the database",esc(ST.error)+"<br><br>Check the connection and tap Reload."); return; }

    var ev=buildEvents(ST.runs), t=totals(ev);
    var shown=ev.filter(function(e){ return ST.filter==="all"||ST.filter===e.type; });

    var html=storeCards(t);
    html+='<div class="note">Reconstructed from production runs: <b>in</b> = crumb produced by the grinders (Grinder 1/2 &amp; Soorya), '
      +'<b>out</b> = crumb pulled from stock when an autoclave is loaded. Truck 30# feeds the special line; Bike 20# feeds the coarse line. '
      +'Balances are the running total over the selected range only (pick <b>All</b> for the lifetime balance).</div>';

    html+='<div class="filters"><div class="seg" id="seg">'
      +'<button data-f="all"'+(ST.filter==="all"?' class="on"':'')+'>All</button>'
      +'<button data-f="in"'+(ST.filter==="in"?' class="on"':'')+'>In only</button>'
      +'<button data-f="out"'+(ST.filter==="out"?' class="on"':'')+'>Out only</button>'
      +'</div><span class="count">'+shown.length+' movement'+(shown.length===1?"":"s")+'</span></div>';

    if(!shown.length){
      html+=block("M3 7h18M3 12h18M3 17h18","No crumb movement in this range","Nothing was produced into or pulled from crumb stock for "+esc(ST.from)+" → "+esc(ST.to)+".");
      v.innerHTML=html; bind(); return;
    }

    // newest first for the list (balAfter already computed chronologically)
    var list=shown.slice().sort(function(a,b){ return tms(b.ts)-tms(a.ts); });
    html+='<div class="ledger">'+list.map(evRow).join("")+'</div>';
    v.innerHTML=html; bind();
  }

  function storeCards(t){
    function card(key){
      var s=STORE[key], io=t[key], net=Math.round((io.in-io.out)*10)/10;
      return '<div class="store '+(key==="bike"?"bike":"")+'">'
        +'<div class="nm">'+esc(s.label)+' · '+esc(s.grade)+'</div>'
        +'<div class="net tnum">'+(net>=0?"+":"")+kg(net)+' <small>kg net</small></div>'
        +'<div class="io"><div>in <b class="pin">'+kg(io.in)+'</b> kg</div><div>out <b class="pout">'+kg(io.out)+'</b> kg</div></div>'
        +'</div>';
    }
    return '<div class="stores">'+card("truck")+card("bike")+'</div>';
  }

  function evRow(e){
    var s=STORE[e.store], gradeCls=e.store==="bike"?"gchip b":"gchip";
    var where = e.type==="in"
      ? '<span class="where">'+esc(e.machine)+' <span class="arrow">\u2192 stock</span></span>'
      : '<span class="where"><span class="arrow">stock \u2192</span> '+esc(e.machine)+'</span>';
    var meta=[];
    meta.push('<span class="'+gradeCls+'">'+esc(s.label.split(" ")[0])+' '+esc(s.grade)+'</span>');
    if(e.type==="out" && e.batch) meta.push("batch "+esc(e.batch)+(e.formulation?" · "+esc(e.formulation):""));
    if(e.shift) meta.push(esc(e.shift)+(e.shiftDate?" "+esc(e.shiftDate):""));
    meta.push(e.supervisor?("\uD83D\uDC64 "+esc(e.supervisor)):'<span style="color:var(--amber)">no supervisor</span>');
    return '<div class="ev">'
      +'<div class="dir"><span class="badge '+e.type+'">'+(e.type==="in"?"In":"Out")+'</span></div>'
      +'<div class="body">'+where+'<div class="meta">'+meta.join(" · ")+'</div></div>'
      +'<div class="amt"><div class="kg '+e.type+'">'+(e.type==="in"?"+":"\u2212")+kg(e.kg)+'<span style="font-size:11px;color:var(--faint)"> kg</span></div>'
        +'<div class="bal">bal '+kg(e.balAfter)+'</div>'
        +'<div class="when">'+fmtWhen(e.ts)+'</div></div>'
      +'</div>';
  }

  function block(path,title,body){
    return '<div class="empty"><svg viewBox="0 0 24 24"><path d="'+path+'"/></svg><b>'+title+'</b><p>'+body+'</p></div>';
  }

  /* ===== controls ===== */
  function applyQuick(q){
    ST.quick=q;
    if(q==="all"){ ST.from="2020-01-01"; ST.to=todayISO(); }
    else { ST.from=shiftDate(parseInt(q,10)-1); ST.to=todayISO(); }
    document.getElementById("fromIn").value=ST.from;
    document.getElementById("toIn").value=ST.to;
    syncQuick();
    load();
  }
  function syncQuick(){ document.querySelectorAll("#quick button").forEach(function(b){ b.classList.toggle("on", b.getAttribute("data-q")===ST.quick); }); }

  function bind(){
    var seg=document.getElementById("seg");
    if(seg) seg.querySelectorAll("button").forEach(function(b){ b.addEventListener("click",function(){ ST.filter=b.getAttribute("data-f"); render(); }); });
  }

  function init(){
    applyQuick("7");                     // default: last 7 days
    document.getElementById("fromIn").addEventListener("change",function(e){ if(e.target.value){ ST.from=e.target.value; ST.quick=""; syncQuick(); load(); } });
    document.getElementById("toIn").addEventListener("change",function(e){ if(e.target.value){ ST.to=e.target.value; ST.quick=""; syncQuick(); load(); } });
    document.querySelectorAll("#quick button").forEach(function(b){ b.addEventListener("click",function(){ applyQuick(b.getAttribute("data-q")); }); });
    document.getElementById("reloadBtn").addEventListener("click", load);
  }
  init();
})();
</script>
</body>
</html>
